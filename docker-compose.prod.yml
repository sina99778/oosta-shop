# Production stack: Postgres + API + Web + Nginx.
#
#   cp .env.production.example .env.production   # then edit
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# NEXT_PUBLIC_API_URL is baked into the web image at build time as ${PUBLIC_ORIGIN}/api.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oosta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-oosta}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oosta} -d ${POSTGRES_DB:-oosta}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-oosta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-oosta}?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ORIGIN: ${PUBLIC_ORIGIN:?set PUBLIC_ORIGIN in .env.production}
      WEB_BASE_URL: ${PUBLIC_ORIGIN}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID:-}
      ZARINPAL_SANDBOX: ${ZARINPAL_SANDBOX:-false}
      ZARINPAL_CURRENCY: ${ZARINPAL_CURRENCY:-IRR}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_ORIGIN}/api
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api

volumes:
  pgdata:
