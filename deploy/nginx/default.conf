# Single-domain reverse proxy: / -> web (Next.js), /api -> api (Express).

# Compress text responses (the Express API sends uncompressed JSON; Next.js
# compresses its own HTML, gzip_proxied skips anything already encoded).
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
  application/json
  application/javascript
  application/xml
  image/svg+xml
  text/css
  text/plain
  text/xml;

server {
  listen 80;
  server_name _;

  client_max_body_size 6m; # matches multer's 5 MB upload limit + multipart overhead

  # API: the trailing slash on proxy_pass strips the /api prefix
  # (so /api/auth/login -> http://api:4000/auth/login).
  location /api/ {
    proxy_pass http://api:4000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Everything else -> Next.js
  location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

